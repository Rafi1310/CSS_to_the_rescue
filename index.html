<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Nintendo Switch</title>
</head>

<body>
    <div>

        <div>
            <div></div>

            <div>
                <label><input type="radio" name="game" value="up"> > </label>
                <label><input type="radio" name="game" value="right"> > </label>
                <label><input type="radio" name="game" value="left"> > </label>
                <label><input type="radio" name="game" value="down"> > </label>
            </div>
        </div>

        <div>
            <div>Nintendo Switch</div>
            <label>
                <input type="checkbox" value="power">
            </label>
        </div>

        <div>
            <div> 
                <button> X </button>
                <button> A </button>
                <button> Y </button>
                <button> B </button>
            </div>

            <div></div>
        </div>

    </div>
    <label>Dark mode
        <input type="checkbox" value="donker">
    </label>
    <label>8-bit
        <input type="checkbox" value="retro">
    </label>
    <label>Helderheid
        <input type="range" name="helderheid" min="10" max="100" value="100">
    </label>
    <label>unreadable
        <input type="checkbox" value="unreadable">
    </label> <!-- easter egg -->
    <script src="script.js"></script>
</body>

</html>
